---
layout: default
---

<div class="page-body">
  {% assign sorted_tags = site.tags | sort %}
  {% for tag in sorted_tags %}
    <a href="{{ site.baseurl }}/tags/{{ tag[0] | slugify | url_encode }}/" style="margin-right:1.25rem; color:var(--muted); text-decoration:none; font-size:0.9rem;">
      {{ tag[0] }} <span style="font-size:0.75rem;">({{ tag[1].size }})</span>
    </a>
  {% endfor %}
</div>
