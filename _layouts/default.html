<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != "" %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  {% include favicons.html %}
  {% seo %}
</head>
<body>

  <header>
    <div class="header-inner">
      <a class="site-name" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav>
        <a href="{{ '/' | relative_url }}">Writing</a>
        <a href="{{ '/tabs/about/' | relative_url }}">About</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <div class="footer-inner">
      <span>{{ site.author }}</span>
      <span class="footer-links">
        {% if site.github.username %}<a href="https://github.com/{{ site.github.username }}" target="_blank" rel="noopener">GitHub</a>{% endif %}
        {% if site.twitter.username %}<a href="https://twitter.com/{{ site.twitter.username }}" target="_blank" rel="noopener">Twitter</a>{% endif %}
        {% if site.social.email %}<a href="mailto:{{ site.social.email }}">Email</a>{% endif %}
      </span>
    </div>
  </footer>

</body>
</html>
