---
layout: default
---

<div class="page-body">
  {% assign sorted_categories = site.categories | sort %}
  {% for category in sorted_categories %}
    <a href="{{ site.baseurl }}/categories/{{ category[0] | slugify | url_encode }}/" style="margin-right:1.25rem; color:var(--muted); text-decoration:none; font-size:0.9rem;">
      {{ category[0] }} <span style="font-size:0.75rem;">({{ category[1].size }})</span>
    </a>
  {% endfor %}
</div>
