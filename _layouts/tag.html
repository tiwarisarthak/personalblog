---
layout: default
---

<h2 style="font-size:1.1rem; margin-bottom:1.5rem; color: var(--muted);">{{ page.title }}</h2>

{% for post in page.posts %}
  <div class="post-row">
    <span class="post-row-date">{{ post.date | date: "%b %-d, %Y" }}</span>
    <span class="post-row-title"><a href="{{ post.url | relative_url }}">{{ post.title }}</a></span>
  </div>
{% endfor %}
