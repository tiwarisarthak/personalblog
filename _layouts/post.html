---
layout: default
---

<article>
  <h1 class="post-title">{{ page.title }}</h1>
  <span class="post-date">{{ page.date | date: "%B %-d, %Y" }}</span>

  <div class="post-body">
    {{ content }}
  </div>

  <nav class="post-nav">
    {% if page.previous.url %}
      <a href="{{ page.previous.url | relative_url }}">← {{ page.previous.title }}</a>
    {% else %}
      <span></span>
    {% endif %}
    {% if page.next.url %}
      <a class="post-nav-next" href="{{ page.next.url | relative_url }}">{{ page.next.title }} →</a>
    {% endif %}
  </nav>
</article>
